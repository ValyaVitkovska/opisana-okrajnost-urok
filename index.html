<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Окръжност, описана около триъгълник</title>
<style>
  :root{
    --brand:#b31b54; --brand-dark:#880e4f;
    --pink-soft:#fce4ec; --pink-border:#f8bbd0;
    --amber-soft:#fff9e6; --amber-border:#ffe082;
    --canvas:#f8fafc;
    --s50:#f8fafc; --s100:#f1f5f9; --s200:#e2e8f0; --s300:#cbd5e1; --s400:#94a3b8;
    --s500:#64748b; --s600:#475569; --s700:#334155; --s800:#1e293b;
    --i50:#eef2ff; --i100:#e0e7ff; --i200:#c7d2fe; --i500:#6366f1; --i600:#4f46e5; --i900:#312e81;
    --e50:#ecfdf5; --e100:#d1fae5; --e200:#a7f3d0; --e600:#059669; --e700:#047857; --e900:#064e3b;
    --r50:#fff1f2; --r200:#fecdd3; --r500:#f43f5e; --r600:#e11d48; --r700:#be123c;
    --a50:#fffbeb; --a200:#fde68a; --a500:#f59e0b; --a600:#d97706; --a700:#b45309; --a900:#78350f; --a950:#451a03;
    --pink50:#fdf2f8; --pink100:#fce7f3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,"Noto Sans",sans-serif;color:var(--s800);background:var(--s50);}
  #root{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;opacity:0;transition:opacity .6s;}
  #root.loaded{opacity:1;}
  svg.ic{display:inline-block;vertical-align:middle;flex-shrink:0;}

  @keyframes float-wobble{0%,100%{transform:translateY(0) rotate(3deg);}50%{transform:translateY(-5px) rotate(-3deg);}}
  @keyframes pop-in{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
  @keyframes slide-up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  @keyframes ping{75%,100%{transform:scale(2);opacity:0;}}
  .anim-pop{animation:pop-in .45s ease-out;}
  .anim-up{animation:slide-up .4s ease-out;}

  ::-webkit-scrollbar{width:7px;height:7px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--s300);border-radius:10px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--s400);}

  /* ---------- ХЕДЪР ---------- */
  header.app{background:var(--brand);padding:16px 16px 12px;position:relative;z-index:30;box-shadow:0 4px 8px rgba(0,0,0,.12);flex-shrink:0;}
  .head-glow{position:absolute;top:0;right:0;width:260px;height:260px;background:rgba(255,255,255,.05);border-radius:50%;filter:blur(48px);transform:translate(25%,-50%);pointer-events:none;}
  .head-inner{max-width:1280px;margin:0 auto;position:relative;z-index:10;}
  .head-top{display:flex;flex-direction:column;align-items:center;gap:16px;}
  .brand-row{display:flex;align-items:center;gap:12px;position:relative;justify-content:center;width:100%;margin-top:8px;}
  .brand-badge{padding:8px;background:rgba(255,255,255,.2);color:#fff;border-radius:12px;border:1px solid rgba(255,255,255,.25);display:none;}
  .title-wrap{position:relative;}
  h1.app{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.01em;line-height:1.15;margin:0;text-align:center;text-shadow:0 2px 5px rgba(0,0,0,.3);padding-right:32px;}
  .mascot{position:absolute;top:-28px;right:-16px;z-index:50;pointer-events:none;animation:float-wobble 3s ease-in-out infinite;filter:drop-shadow(0 8px 10px rgba(0,0,0,.25));display:none;}
  .mascot .bubble{background:#fde047;color:var(--i900);font-weight:900;padding:6px 12px;border-radius:16px;font-size:12px;position:relative;box-shadow:0 10px 15px rgba(0,0,0,.2);border:1px solid var(--a200);white-space:nowrap;}
  .mascot .tail{position:absolute;bottom:-6px;left:24px;width:12px;height:12px;background:#fde047;transform:rotate(45deg);border-bottom:1px solid var(--a200);border-right:1px solid var(--a200);}
  .tabs{display:flex;gap:8px;overflow-x:auto;width:100%;padding-bottom:8px;}
  .tab{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:9999px;font-size:14px;font-weight:700;white-space:nowrap;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.1);color:var(--pink50);cursor:pointer;transition:all .25s;outline:none;transform:scale(.96);}
  .tab:hover{background:rgba(255,255,255,.2);color:#fff;}
  .tab.active{background:#fff;color:var(--brand);box-shadow:0 4px 10px rgba(0,0,0,.2);border-color:#fff;transform:scale(1);}
  .author{margin-top:8px;text-align:center;color:var(--pink100);font-size:12px;font-weight:500;border-top:1px solid rgba(255,255,255,.1);padding-top:8px;letter-spacing:.02em;opacity:.92;}
  .author b{color:#fff;}

  /* Весело говорещо емотиче */
  .greeter{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;flex-wrap:nowrap;}
  .greeter-face{font-size:30px;line-height:1;display:inline-block;animation:bob 1.6s ease-in-out infinite;filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));}
  .greeter-bubble{position:relative;background:#fde047;color:var(--i900);font-weight:800;padding:7px 14px;border-radius:16px;font-size:13px;box-shadow:0 6px 14px rgba(0,0,0,.18);border:1px solid var(--a200);min-height:18px;min-width:140px;max-width:78vw;display:inline-flex;align-items:center;animation:pop-in .5s ease-out;}
  .greeter-bubble .b-tail{position:absolute;left:-5px;top:50%;width:11px;height:11px;background:#fde047;border-left:1px solid var(--a200);border-bottom:1px solid var(--a200);transform:translateY(-50%) rotate(45deg);}
  .greeter-bubble .b-cursor{display:inline-block;width:2px;height:1.05em;background:var(--i900);margin-left:1px;animation:blink 1s step-end infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg);}50%{transform:translateY(-6px) rotate(5deg);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
  @media (min-width:640px){ .greeter-face{font-size:36px;} .greeter-bubble{font-size:14px;} }

  /* ---------- ОСНОВНО ТЯЛО ---------- */
  main.app{flex:1;display:flex;flex-direction:column;overflow:hidden;width:100%;max-width:1280px;margin:0 auto;position:relative;}
  .left{display:flex;flex-direction:column;width:100%;background:#fff;border-right:1px solid var(--s200);overflow-y:auto;height:100%;box-shadow:4px 0 24px rgba(0,0,0,.03);z-index:20;}
  .left-pad{padding:20px;}
  .right{flex:1;width:100%;position:relative;background:var(--canvas);overflow:hidden;touch-action:none;display:none;height:100%;z-index:10;}
  #root.tab-explore .left{height:45%;border-top:1px solid var(--s200);}
  #root.tab-explore .right{display:block;height:55%;}

  @media (min-width:640px){
    .brand-badge{display:block;}
    h1.app{font-size:24px;}
    .mascot{display:block;}
  }
  @media (min-width:1024px){
    main.app{flex-direction:row;}
    .left{width:450px;height:100%;}
    .left-pad{padding:32px;}
    .right{display:block;height:100%;}
    #root.tab-explore .left{height:100%;border-top:none;}
    #root.tab-explore .right{height:100%;}
    .mascot{top:-36px;right:-140px;}
  }
  @media (min-width:1280px){
    .left{width:500px;}
    .head-top{flex-direction:row;justify-content:space-between;}
    .brand-row{width:auto;justify-content:flex-start;}
    h1.app{text-align:left;}
    .tabs{justify-content:flex-end;width:auto;}
  }

  /* ---------- ОБЩИ КОМПОНЕНТИ ---------- */
  .section{display:flex;flex-direction:column;gap:24px;padding-bottom:24px;}
  h2.head{font-size:20px;font-weight:900;color:var(--s800);margin:0 0 8px;display:flex;align-items:center;gap:8px;line-height:1.2;}
  p.lead{font-size:14px;color:var(--s500);line-height:1.6;font-weight:500;margin:0;}
  .card{background:#fff;padding:20px;border-radius:24px;border:1px solid var(--s200);box-shadow:0 1px 2px rgba(0,0,0,.05);position:relative;overflow:hidden;}
  .card h3{margin:0 0 12px;font-size:16px;font-weight:800;color:var(--i900);position:relative;z-index:1;}
  .card p{position:relative;z-index:1;}
  .ghost-ico{position:absolute;right:-16px;top:-16px;color:var(--i50);opacity:.6;pointer-events:none;}
  .muted{font-size:14px;color:var(--s700);line-height:1.6;font-weight:500;}

  .box{padding:18px;border-radius:16px;border:1px solid;}
  .box h3{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;margin:0 0 10px;}
  .box p{font-size:14px;line-height:1.6;font-weight:500;margin:0;}
  .box.indigo{background:var(--i50);border-color:var(--i100);color:var(--i900);}
  .box.emerald{background:var(--e50);border-color:var(--e100);color:var(--e900);}
  .box.pink{background:var(--pink-soft);border-color:var(--pink-border);color:var(--brand-dark);}
  .box.amber{background:var(--amber-soft);border-color:var(--amber-border);color:var(--a950);}

  .pill-note{background:var(--i50);padding:16px;border-radius:12px;border:1px solid var(--i100);display:flex;gap:12px;align-items:flex-start;}
  .pill-note p{font-size:13px;color:var(--i900);font-weight:700;line-height:1.6;margin:0;}
  .pill-note hr{border:none;border-top:1px solid var(--i200);margin:8px 0;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700;border:none;cursor:pointer;transition:all .2s;border-radius:12px;font-family:inherit;}
  .btn.block{width:100%;}
  .btn.lg{padding:14px 20px;border-radius:16px;font-size:14px;box-shadow:0 4px 8px rgba(0,0,0,.12);}
  .btn.sm{padding:10px 16px;font-size:12px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
  .btn.brand{background:var(--brand);color:#fff;}
  .btn.brand:hover{background:var(--brand-dark);box-shadow:0 8px 14px rgba(0,0,0,.16);}
  .btn.emerald{background:var(--e600);color:#fff;}
  .btn.emerald:hover{background:var(--e700);}
  .btn.ghost{background:var(--s50);color:var(--s500);border:1px solid var(--s200);}
  .btn.ghost:hover{background:var(--s100);color:var(--s700);}
  .btn:disabled{background:var(--s300)!important;cursor:not-allowed;box-shadow:none;}
  .link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--brand);background:none;border:none;cursor:pointer;font-family:inherit;}
  .link:hover{color:var(--brand-dark);}

  /* ЗАГАДКА */
  .riddle-card{background:linear-gradient(to bottom right,var(--pink-soft),var(--amber-soft));padding:22px;border-radius:24px;border:1px solid var(--pink-border);box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.7);color:var(--brand);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;padding:5px 12px;border-radius:9999px;margin-bottom:12px;}
  .riddle-card .q1{font-size:15px;color:var(--s800);line-height:1.6;font-weight:800;margin:0;}
  .riddle-card .q1 .hl{color:var(--brand);}
  .riddle-card .q2{font-size:17px;color:#0f172a;line-height:1.5;font-weight:900;margin:12px 0 0;}
  .house-wrap{margin-top:16px;background:rgba(255,255,255,.6);border-radius:16px;border:1px solid rgba(255,255,255,.8);padding:8px;}

  /* СТЪПКИ */
  .step-btn{width:100%;text-align:left;padding:16px;border-radius:16px;border:1px solid var(--s200);background:#fff;cursor:pointer;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.05);font-family:inherit;}
  .step-btn:hover{background:var(--s50);border-color:var(--i200);}
  .step-row{display:flex;align-items:center;gap:12px;}
  .step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--i600);color:#fff;flex-shrink:0;}
  .step-t{font-size:14px;font-weight:800;color:var(--s800);}
  .step-s{font-size:12px;color:var(--s500);margin-top:2px;}
  .step-chev{margin-left:auto;color:var(--s300);}
  .step-btn:hover .step-chev{color:var(--i500);}

  .infobox{padding:18px;border-radius:16px;border:1px solid;}
  .infobox h3{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;margin:0 0 10px;}
  .infobox p{font-size:14px;line-height:1.6;font-weight:500;margin:0;}
  .infobox.indigo{background:var(--i50);border-color:var(--i100);color:var(--i900);}
  .infobox.emerald{background:var(--e50);border-color:var(--e100);color:var(--e900);}
  .infobox.pink{background:var(--pink-soft);border-color:var(--pink-border);color:var(--brand-dark);}
  .confirm{display:flex;align-items:flex-start;gap:8px;background:rgba(255,255,255,.7);padding:12px;border-radius:12px;border:1px solid;margin-top:12px;}
  .confirm p{font-size:13px;font-weight:800;line-height:1.5;margin:0;}
  .confirm.indigo{border-color:var(--i100);} .confirm.indigo p{color:var(--e900);}
  .confirm.emerald{border-color:var(--e100);} .confirm.emerald p{color:var(--e900);}
  .confirm.pink{border-color:var(--pink-border);} .confirm.pink p{color:var(--brand-dark);}

  /* АНАЛИЗ НА ЪГЛИТЕ */
  .analysis{padding:20px;border-radius:16px;border:1px solid;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:all .4s;}
  .analysis .label{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:var(--s500);margin-bottom:4px;}
  .analysis .type{font-size:24px;font-weight:900;margin-bottom:6px;}
  .analysis .pos{display:flex;gap:8px;align-items:flex-start;font-size:12px;font-weight:600;color:var(--s700);margin-top:12px;padding-top:12px;border-top:1px solid rgba(0,0,0,.06);}
  .atype-acute{background:var(--e50);border-color:var(--e200);} .atype-acute .type,.atype-acute .pos .ic{color:var(--e600);}
  .atype-right{background:var(--a50);border-color:var(--a200);} .atype-right .type,.atype-right .pos .ic{color:var(--a600);}
  .atype-obtuse{background:var(--r50);border-color:var(--r200);} .atype-obtuse .type,.atype-obtuse .pos .ic{color:var(--r600);}
  .atype-degenerate{background:var(--s50);border-color:var(--s200);} .atype-degenerate .type,.atype-degenerate .pos .ic{color:var(--s500);}

  /* ТЕОРИЯ – доказателство */
  .proof h3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;text-align:center;color:var(--s800);border-bottom:1px solid var(--s100);padding-bottom:8px;margin:0 0 16px;}
  .proof .step{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
  .proof .n{width:24px;height:24px;border-radius:50%;background:var(--s100);color:var(--s600);font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;border:1px solid var(--s200);}
  .proof .step p{font-size:13px;color:var(--s700);line-height:1.6;margin:0;padding-top:2px;}

  /* ПРИМЕР */
  .solution{background:var(--s50);border-radius:16px;padding:18px;border:1px solid var(--s100);margin-top:8px;}
  .solution h4{font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:800;color:var(--s400);margin:0 0 12px;border-bottom:1px solid var(--s200);padding-bottom:8px;}
  .solution ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px;}
  .solution li{display:flex;gap:8px;font-size:13px;color:var(--s700);line-height:1.55;}
  .solution li .ic{color:var(--brand);flex-shrink:0;margin-top:2px;}
  .done{margin-top:16px;padding:12px;background:var(--e50);border-radius:12px;display:flex;align-items:center;gap:8px;font-weight:700;color:var(--e700);font-size:13px;border:1px solid var(--e100);}

  /* УПРАЖНЕНИЕ */
  .task{background:#fff;border:1px solid var(--s200);border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:box-shadow .3s;}
  .task:hover{box-shadow:0 6px 16px rgba(0,0,0,.08);}
  .task-body{padding:18px;display:flex;gap:14px;}
  .task-ico{background:var(--pink50);color:var(--brand);width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--pink100);}
  .task-q{font-size:14px;font-weight:700;color:var(--s700);line-height:1.6;margin:0;padding-top:4px;}
  .task-answer{background:var(--e50);padding:18px;border-top:1px solid var(--e100);font-size:14px;color:var(--e900);}
  .task-answer b{display:flex;align-items:center;gap:8px;margin-bottom:8px;color:var(--e700);}
  .task-answer span{line-height:1.6;font-weight:500;display:block;}
  .task-foot{background:var(--s50);padding:14px;border-top:1px solid var(--s100);text-align:right;}
  .reveal-btn{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--brand);padding:9px 18px;border-radius:12px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.08);border:1px solid var(--pink100);text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:all .2s;font-family:inherit;}
  .reveal-btn:hover{background:var(--brand);color:#fff;}

  /* ТЕСТ */
  .qcard{background:#fff;padding:18px;border-radius:16px;border:1px solid var(--s200);box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .qcard h3{font-size:14px;font-weight:700;color:var(--s700);margin:0 0 12px;line-height:1.5;}
  .opt{display:flex;align-items:flex-start;gap:12px;padding:11px;border-radius:12px;border:1px solid var(--s200);cursor:pointer;transition:all .2s;color:var(--s600);margin-bottom:8px;}
  .opt:last-child{margin-bottom:0;}
  .opt:hover{background:var(--s50);}
  .opt input{margin-top:2px;width:16px;height:16px;accent-color:var(--i600);}
  .opt span{font-size:14px;flex:1;}
  .opt.sel{border-color:var(--i500);background:var(--i50);color:var(--i900);font-weight:600;box-shadow:0 0 0 1px var(--i500) inset;}
  .opt.correct{border-color:var(--e600);background:var(--e50);color:var(--e900);font-weight:700;box-shadow:0 0 0 1px var(--e600) inset;}
  .opt.wrong{border-color:var(--r200);background:var(--r50);color:var(--r700);font-weight:600;}
  .opt.dim{border-color:var(--s100);background:var(--s50);opacity:.5;color:var(--s400);}
  .opt .mark-ok{color:var(--e600);flex-shrink:0;}
  .opt .mark-no{color:var(--r500);flex-shrink:0;}
  .opt .mark-faint{color:var(--e600);opacity:.5;flex-shrink:0;}
  .score{text-align:center;font-size:14px;font-weight:700;color:var(--s600);padding-top:8px;}
  .score b{color:var(--brand);font-size:18px;}

  /* ЪГЛОВ ИНДИКАТОР (върху чертежа) */
  .angbox{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.95);border:1px solid var(--s200);box-shadow:0 8px 20px rgba(0,0,0,.08);padding:14px;border-radius:16px;pointer-events:none;z-index:20;}
  .angbox .t{font-size:11px;font-weight:700;color:var(--s500);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;display:flex;gap:6px;align-items:center;}
  .angbox .t .ic{color:var(--i500);}
  .angbox .rows{display:flex;flex-direction:column;gap:6px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;}
  .ang{padding:5px 11px;border-radius:8px;background:var(--s50);border:1px solid var(--s100);color:var(--s700);}
  .ang.warn{background:var(--a50);color:var(--a700);font-weight:700;border-color:var(--a200);}
  .ang.hot{background:var(--r50);color:var(--r700);font-weight:700;border-color:var(--r200);}

  .fig{background:var(--s50);border:1px solid var(--s200);border-radius:14px;padding:12px;margin-top:14px;}
  .fig svg{display:block;width:100%;max-width:300px;height:auto;margin:0 auto;}
  .fig-cap{font-size:11px;color:var(--s500);text-align:center;margin-top:8px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}
  .fig-cap i{display:inline-flex;align-items:center;gap:6px;font-style:normal;font-weight:600;}
  .fig-cap .ln{display:inline-block;width:20px;border-top:2px solid;}

  #board{width:100%;height:100%;cursor:crosshair;position:relative;z-index:10;}
  .vx-hit{cursor:grab;}
  .vx-hit:active{cursor:grabbing;}
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";

/* ============ ИКОНИ (вградени SVG) ============ */
var ICON = {

/* ============ ГЕОМЕТРИЯ ============ */
function dist(p1,p2){ return Math.sqrt((p1.x-p2.x)*(p1.x-p2.x)+(p1.y-p2.y)*(p1.y-p2.y)); }
function safeAcos(x){ return Math.acos(Math.max(-1, Math.min(1, x))); }

function circumcenter(A,B,C){
  var D = 2*(A.x*(B.y-C.y)+B.x*(C.y-A.y)+C.x*(A.y-B.y));
  if(Math.abs(D)<0.1) return null;
  var aa=A.x*A.x+A.y*A.y, bb=B.x*B.x+B.y*B.y, cc=C.x*C.x+C.y*C.y;
  return {
    x:(aa*(B.y-C.y)+bb*(C.y-A.y)+cc*(A.y-B.y))/D,
    y:(aa*(C.x-B.x)+bb*(A.x-C.x)+cc*(B.x-A.x))/D
  };
}
function angles(A,B,C){
  var a=dist(B,C), b=dist(A,C), c=dist(A,B);
  return {
    A:safeAcos((b*b+c*c-a*a)/(2*b*c))*180/Math.PI,
    B:safeAcos((a*a+c*c-b*b)/(2*a*c))*180/Math.PI,
    C:safeAcos((a*a+b*b-c*c)/(2*a*b))*180/Math.PI
  };
}
function computeGeo(){
  var v=state.vertices, O=circumcenter(v.A,v.B,v.C);
  var ang=angles(v.A,v.B,v.C);
  var maxA=Math.max(ang.A,ang.B,ang.C);
  var type='Изроден', pos='', cls='degenerate', stroke='#64748b';
  if(O){
    if(maxA>92){ type='Тъпоъгълен'; pos='Точка O е външна за триъгълника'; cls='obtuse'; stroke='#e11d48'; }
    else if(maxA>=88 && maxA<=92){ type='Правоъгълен'; pos='Точка O е средата на хипотенузата'; cls='right'; stroke='#d97706'; }
    else { type='Остроъгълен'; pos='Точка O е вътрешна за триъгълника'; cls='acute'; stroke='#059669'; }
  }
  return { O:O, R:O?dist(O,v.A):0, ang:ang, type:type, pos:pos, cls:cls, stroke:stroke };
}

/* ============ ИЗГРАЖДАНЕ НА ЧЕРТЕЖА (SVG) ============ */
function bisectorLine(p1,p2,geo,opacity){
  var mid={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
  var dx=p2.x-p1.x, dy=p2.y-p1.y, len=Math.sqrt(dx*dx+dy*dy)||1;
  var ux=-dy/len, uy=dx/len, L=2000;
  return '<line x1="'+(mid.x-L*ux)+'" y1="'+(mid.y-L*uy)+'" x2="'+(mid.x+L*ux)+'" y2="'+(mid.y+L*uy)+
         '" stroke="'+geo.stroke+'" stroke-width="2.5" stroke-dasharray="8 6" opacity="'+opacity+'"/>';
}
function boardSVG(){
  var v=state.vertices, A=v.A, B=v.B, C=v.C, ms=state.missionStep;
  var geo=computeGeo(), O=geo.O;
  var G={x:(A.x+B.x+C.x)/3, y:(A.y+B.y+C.y)/3};
  function lbl(p){ var dx=p.x-G.x, dy=p.y-G.y, l=Math.sqrt(dx*dx+dy*dy)||1; return {x:p.x+dx/l*35, y:p.y+dy/l*35+8}; }
  var s='';
  s+='<defs>'+
     '<pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">'+
     '<path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="1"/></pattern>'+
     '<filter id="sh" x="-20%" y="-20%" width="140%" height="140%">'+
     '<feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#94a3b8" flood-opacity="0.4"/></filter></defs>';
  s+='<rect width="100%" height="100%" fill="url(#grid)"/>';

  if(O){
    if(ms>=1){ s+=bisectorLine(A,B,geo,'0.45')+bisectorLine(B,C,geo,'0.45'); }
    if(ms>=2){ s+=bisectorLine(C,A,geo,'0.65'); }
    if(ms>=4){ s+='<circle cx="'+O.x+'" cy="'+O.y+'" r="'+geo.R+'" fill="rgba(59,130,246,0.03)" stroke="'+geo.stroke+'" stroke-width="3" stroke-dasharray="6 6"/>'; }
    if(ms>=3){
      s+='<g stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="5 5">'+
         '<line x1="'+O.x+'" y1="'+O.y+'" x2="'+A.x+'" y2="'+A.y+'"/>'+
         '<line x1="'+O.x+'" y1="'+O.y+'" x2="'+B.x+'" y2="'+B.y+'"/>'+
         '<line x1="'+O.x+'" y1="'+O.y+'" x2="'+C.x+'" y2="'+C.y+'"/></g>';
    }
  }
  // триъгълник
  s+='<polygon points="'+A.x+','+A.y+' '+B.x+','+B.y+' '+C.x+','+C.y+
     '" fill="rgba(59,130,246,0.04)" stroke="#64748b" stroke-width="3.5" stroke-linejoin="round"/>';
  // пресечна точка / точка O
  if(O && ms>=1){
    var col = ms>=2 ? geo.stroke : '#6366f1';
    var nm = ms>=2 ? 'O' : '?';
    s+='<g class="anim-pop" transform="translate('+O.x+','+O.y+')">'+
       '<circle r="7" fill="'+col+'" filter="url(#sh)"/><circle r="2.5" fill="#fff"/>'+
       '<text x="14" y="20" fill="#1e293b" font-size="20" font-weight="900" style="text-shadow:0 2px 5px white">'+nm+'</text></g>';
  }
  // върхове
  var ids=['A','B','C'];
  for(var i=0;i<ids.length;i++){
    var id=ids[i], pt=v[id], lp=lbl(pt), drag=(state.dragging===id);
    s+='<g>';
    s+='<text x="'+lp.x+'" y="'+lp.y+'" fill="#1e293b" font-size="24" font-weight="900" text-anchor="middle" style="text-shadow:0 2px 5px white;pointer-events:none">'+id+'</text>';
    s+='<circle class="vx-hit" data-v="'+id+'" cx="'+pt.x+'" cy="'+pt.y+'" r="45" fill="transparent"/>';
    s+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="'+(drag?14:10)+'" fill="'+(drag?'#6366f1':'#fff')+'" stroke="'+(drag?'#fff':'#475569')+'" stroke-width="3.5" filter="url(#sh)" style="pointer-events:none"/>';
    if(drag) s+='<circle cx="'+pt.x+'" cy="'+pt.y+'" r="25" fill="none" stroke="#6366f1" stroke-width="2.5" opacity="0.5" style="pointer-events:none;animation:ping 1s cubic-bezier(0,0,.2,1) infinite"/>';
    s+='</g>';
  }
  return s;
}
function angBoxHTML(geo){
  function cls(a){ return a>92?'hot':(a>=88&&a<=92?'warn':''); }
  var a=geo.ang;
  return '<div class="t">'+ic('triangle',16)+' Ъгли</div><div class="rows">'+
    '<span class="ang '+cls(a.A)+'">∠A ≈ '+Math.round(a.A)+'°</span>'+
    '<span class="ang '+cls(a.B)+'">∠B ≈ '+Math.round(a.B)+'°</span>'+
    '<span class="ang '+cls(a.C)+'">∠C ≈ '+Math.round(a.C)+'°</span></div>';
}

     '<p style="color:var(--a950)">Окръжност, която минава през трите върха на триъгълник, се нарича <b>описана около триъгълника</b>. Триъгълникът се нарича <b>вписан</b> в тази окръжност.</p></div>';
  h+='<div class="box pink"><h3 style="font-size:12px;text-transform:uppercase;letter-spacing:.08em">Теорема</h3>'+
     '<p style="font-weight:700">Около всеки триъгълник може да се опише единствена окръжност. Центърът на тази окръжност е пресечната точка на симетралите на страните на триъгълника.</p></div>';
  h+='<div class="card proof"><h3>Доказателство</h3>';
  for(var i=0;i<steps.length;i++){
    h+='<div class="step"><div class="n">'+(i+1)+'</div><p>'+steps[i]+'</p></div>';
  }
  return h+'</div></div>';
}

    'Нека L е точката, в която ъглополовящата на ∠BAC пресича окръжността.',
    'Тогава от равенството на вписаните ъгли следва, че L е средата на дъгата BC.',
    'Симетралата на хордата BC лежи на диаметър на окръжността, който е перпендикулярен на хордата.',
    'По теорема следва, че тя разполовява дъгата BC. Следователно тя също минава през точката L.'
  ];

    '<h3 style="color:var(--s800);font-size:16px;display:flex;align-items:center;gap:8px">'+ic('lightbulb',20,'')+' Примерна задача</h3>'+
    '<p class="muted" style="font-weight:600;margin:0 0 16px">Триъгълникът ABC е вписан в окръжност. Докажете, че ъглополовящата на ∠BAC и симетралата на страната BC на триъгълника се пресичат в точка от окръжността.</p>'+
    '<div class="fig">'+figInscribed()+
      '<div class="fig-cap">'+
        '<i><span class="ln" style="border-color:#b31b54"></span> ъглополовяща на ∠BAC</i>'+
        '<i><span class="ln" style="border-color:#94a3b8;border-top-style:dashed"></span> симетрала на BC</i>'+
      '</div></div>'+
    '<div class="solution"><h4>Решение</h4><ul>';
  for(var i=0;i<li.length;i++){ h+='<li>'+ic('chevronRight',16)+'<span>'+li[i]+'</span></li>'; }
  h+='</ul><div class="done">'+ic('checkCircle',16)+' Доказателството е завършено.</div></div></div></div>';

function tabPractice(){
  var h='<div class="section anim-up"><div><h2 class="head">Упражнение</h2>'+
        '<p class="lead">Опитайте да решите задачите самостоятелно, преди да разкриете отговора.</p></div>'+
        '<div style="display:flex;justify-content:flex-end">'+
          '<button class="btn '+(state.allSolutions?'ghost':'brand')+' sm" data-act="toggleAll">'+
            ic(state.allSolutions?'eyeOff':'eye',16)+' '+(state.allSolutions?'Скрий всички решения':'Покажи всички решения')+
          '</button>'+
        '</div>'+
        '<div style="display:flex;flex-direction:column;gap:16px">';
  for(var i=0;i<TASKS.length;i++){
    var t=TASKS[i], open=state.allSolutions || !!state.revealed[t.id];
    h+='<div class="task"><div class="task-body">'+
       '<div class="task-ico">'+ic(t.icon,20)+'</div>'+
       '<p class="task-q">'+t.q+'</p></div>';
    if(t.fig){ h+='<div style="padding:0 18px"><div class="fig">'+t.fig+'</div></div>'; }
    if(open){
      h+='<div class="task-answer anim-up"><b>'+ic('check',16)+' Отговор / Решение:</b><span>'+t.a+'</span></div>';
    } else {
      h+='<div class="task-foot"><button class="reveal-btn" data-act="reveal" data-id="'+t.id+'">'+ic('eye',16)+' Покажи решението</button></div>';
    }
    h+='</div>';
  }
  return h+'</div></div>';
}

function tabQuiz(){
  var answered=Object.keys(state.quiz).length, total=QUIZ.length, sr=state.showQuizResult;
  var h='<div class="section anim-up"><div><h2 class="head">'+ic('listChecks',22)+' Проверка на знанията</h2>'+
        '<p class="lead">Отговорете на въпросите и натиснете бутона „Провери" в края.</p></div>'+
        '<div style="display:flex;flex-direction:column;gap:18px">';
  for(var qi=0; qi<QUIZ.length; qi++){
    var q=QUIZ[qi];
    h+='<div class="qcard"><h3>'+(qi+1)+'. '+q.q+'</h3>';
    for(var oi=0; oi<q.options.length; oi++){
      var sel=(state.quiz[qi]===oi), corr=(q.correct===oi), cls='', mark='';
      if(sel && !sr) cls='sel';
      if(sr){
        if(corr) cls='correct'; else if(sel && !corr) cls='wrong'; else cls='dim';
        if(sel && corr) mark=ic('checkCircle',20,'mark-ok');
        else if(sel && !corr) mark=ic('xCircle',20,'mark-no');
        else if(corr) mark=ic('checkCircle',20,'mark-faint');
      }
      h+='<label class="opt '+cls+'">'+
         '<input type="radio" name="q'+qi+'" '+(sel?'checked':'')+' '+(sr?'disabled':'')+' data-act="quiz" data-q="'+qi+'" data-o="'+oi+'">'+
         '<span>'+q.options[oi]+'</span>'+mark+'</label>';
    }
    h+='</div>';
  }
  var dis=(answered<total||sr);
  h+='<button class="btn brand block" style="padding:14px;border-radius:16px;margin-top:4px" data-act="quizSubmit" '+(dis?'disabled':'')+'>'+
     (sr?'Резултатите са показани':'Провери отговорите')+'</button>';
  if(sr){
    var good=0;
    for(var k in state.quiz){ if(state.quiz[k]===QUIZ[k].correct) good++; }
    h+='<div class="score anim-up">Вярно отговорени: <b>'+good+'</b> от '+total+'</div>';
  }
  return h+'</div></div>';
}

function renderLeft(){
  var el=document.getElementById('left');
  var top=el.scrollTop;
  var t=state.activeTab, html='';
  if(t==='challenge') html=tabChallenge();
  else if(t==='review') html=tabReview();
  else if(t==='explore') html=tabExplore();
  else if(t==='theory') html=tabTheory();
  else if(t==='example') html=tabExample();
  else if(t==='practice') html=tabPractice();
  else if(t==='quiz') html=tabQuiz();
  el.querySelector('.left-pad').innerHTML=html;
  el.scrollTop=top;
}

/* ============ ОБНОВЯВАНЕ НА ЧЕРТЕЖА ============ */
function refreshGeometry(){
  var geo=computeGeo();
  document.getElementById('board').innerHTML=boardSVG();
  document.getElementById('angbox').innerHTML=angBoxHTML(geo);
  var ac=document.getElementById('analysisCard');
  if(ac){ ac.className='analysis atype-'+geo.cls; ac.innerHTML=analysisHTML(geo); }
}

/* ============ ТАБОВЕ ============ */
function setTab(id){
  state.activeTab=id;
  var root=document.getElementById('root');
  if(id==='explore') root.classList.add('tab-explore'); else root.classList.remove('tab-explore');
  var btns=document.querySelectorAll('.tab');
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('active', btns[i].getAttribute('data-tab')===id); }
  renderLeft();
}

/* ============ СЪБИТИЯ ============ */
function onLeftClick(e){
  var el=e.target.closest('[data-act]');
  if(!el) return;
  var act=el.getAttribute('data-act');
  if(act==='hint'){ state.showHint=true; renderLeft(); }
  else if(act==='goReview'){ setTab('review'); }
  else if(act==='step'){ state.missionStep=parseInt(el.getAttribute('data-step'),10); renderLeft(); refreshGeometry(); }
  else if(act==='reset'){ state.missionStep=0; renderLeft(); refreshGeometry(); }
  else if(act==='reveal'){ var id=parseInt(el.getAttribute('data-id'),10); state.revealed[id]=!state.revealed[id]; renderLeft(); }
  else if(act==='toggleAll'){
    if(state.allSolutions){ state.allSolutions=false; state.revealed={}; }
    else { state.allSolutions=true; }
    renderLeft();
  }
  else if(act==='quizSubmit'){ if(!el.disabled){ state.showQuizResult=true; renderLeft(); } }
}
function onLeftChange(e){
  var el=e.target.closest('[data-act="quiz"]');
  if(!el) return;
  state.quiz[parseInt(el.getAttribute('data-q'),10)]=parseInt(el.getAttribute('data-o'),10);
  state.showQuizResult=false;
  renderLeft();
}

/* drag */
function svgCoords(e){
  var svg=document.getElementById('board');
  var pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function onDown(e){
  var hit=e.target.closest('.vx-hit');
  if(!hit) return;
  state.dragging=hit.getAttribute('data-v');
  var b=document.getElementById('board');
  try{ b.setPointerCapture(e.pointerId); }catch(err){}
  refreshGeometry();
  e.stopPropagation();
}
function onMove(e){
  if(!state.dragging) return;
  var c=svgCoords(e);
  state.vertices[state.dragging]={x:clamp(c.x,20,580), y:clamp(c.y,20,580)};
  refreshGeometry();
}
function onUp(e){
  if(state.dragging){
    try{ document.getElementById('board').releasePointerCapture(e.pointerId); }catch(err){}
    state.dragging=null;
    refreshGeometry();
  }
}

/* ============ ИЗГРАЖДАНЕ НА ОБВИВКАТА ============ */
function tabsHTML(){
  var s='';
  for(var i=0;i<TABS.length;i++){
    var t=TABS[i], active=(t.id===state.activeTab)?' active':'';
    s+='<button class="tab'+active+'" data-tab="'+t.id+'">'+ic(t.icon,16)+' '+t.label+'</button>';
  }
  return s;
}
function shell(){
  return ''+
  '<header class="app"><div class="head-glow"></div><div class="head-inner">'+
    '<div class="greeter">'+
      '<span class="greeter-face" id="mascotFace">😄</span>'+
      '<div class="greeter-bubble"><span class="b-tail"></span><span id="mascotSay"></span><span class="b-cursor"></span></div>'+
    '</div>'+
    '<div class="head-top">'+
      '<div class="brand-row"><div class="brand-badge">'+ic('circle',24)+'</div>'+
        '<div class="title-wrap"><h1 class="app">Окръжност, описана около триъгълник</h1></div>'+
      '</div>'+
      '<div class="tabs" id="tabs">'+tabsHTML()+'</div>'+
    '</div>'+
    '<div class="author">Идея и педагогически решения: <b>Валя Витковска</b> | Дигитална реализация: <b>с помощта на изкуствен интелект</b></div>'+
  '</div></header>'+
  '<main class="app">'+
    '<div class="left" id="left"><div class="left-pad"></div></div>'+
    '<div class="right" id="right">'+
      '<svg id="board" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet"></svg>'+
      '<div class="angbox" id="angbox"></div>'+
    '</div>'+
  '</main>';
}

/* ============ ГОВОРЕЩО ЕМОТИЧЕ ============ */
var SAY = [
  { t:'Здравейте, ученици! 👋', f:'😄' },
  { t:'Днес чертаем окръжности! ⭕', f:'🤓' },
  { t:'Хайде да открием центъра! 🎯', f:'🧐' },
  { t:'Геометрията е забавна! 📐', f:'🥳' }
];
function startMascot(){
  var say=document.getElementById('mascotSay'), face=document.getElementById('mascotFace');
  if(!say) return;
  var pi=0, ci=0, dir=1;
  function tick(){
    var phrase=SAY[pi], chars=Array.from(phrase.t);
    if(ci===0 && dir>0 && face) face.textContent=phrase.f;
    say.textContent=chars.slice(0,ci).join('');
    if(dir>0){
      if(ci<chars.length){ ci++; setTimeout(tick,60); }
      else { dir=-1; setTimeout(tick,1700); }
    } else {
      if(ci>0){ ci--; setTimeout(tick,25); }
      else { dir=1; pi=(pi+1)%SAY.length; setTimeout(tick,300); }
    }
  }
  tick();
}

function init(){
  var root=document.getElementById('root');
  root.innerHTML=shell();

  document.getElementById('tabs').addEventListener('click', function(e){
    var b=e.target.closest('.tab'); if(b) setTab(b.getAttribute('data-tab'));
  });
  var left=document.getElementById('left');
  left.addEventListener('click', onLeftClick);
  left.addEventListener('change', onLeftChange);

  var board=document.getElementById('board');
  board.addEventListener('pointerdown', onDown);
  var right=document.getElementById('right');
  right.addEventListener('pointermove', onMove);
  right.addEventListener('pointerup', onUp);
  right.addEventListener('pointerleave', onUp);

  renderLeft();
  refreshGeometry();
  startMascot();
  requestAnimationFrame(function(){ root.classList.add('loaded'); });
}
document.addEventListener('DOMContentLoaded', init);
</script>
